services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-goungue_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    # Pas de port publié vers l'hôte par défaut : l'app parle à "db" via le réseau interne.
    # Pour s'y connecter depuis un client MySQL sur la machine hôte (DBeaver, Workbench...),
    # décommenter la ligne ci-dessous (adapter le port si 3306 est déjà pris localement) :
    # ports:
    #   - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-goungue_db}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SETUP_SECRET_KEY: ${SETUP_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
    volumes:
      - uploads_data:/app/uploads

volumes:
  db_data:
  uploads_data:
