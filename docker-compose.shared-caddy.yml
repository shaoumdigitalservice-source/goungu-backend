# À utiliser à la place de docker-compose.prod.yml sur un VPS mutualisé où un Caddy
# central (dédié, hors de tout projet applicatif) occupe déjà les ports 80/443 :
#   docker compose -f docker-compose.yml -f docker-compose.shared-caddy.yml up -d --build
#
# Ne lance PAS de Caddy ici : app et frontend rejoignent en plus le réseau Docker
# externe partagé (par défaut "edge") avec des alias stables ("goungu-app",
# "goungu-frontend"), pour que ce Caddy central puisse les atteindre par ces noms
# et leur ajouter un bloc de site (voir sites/*.caddy de ce Caddy central).
#
# IMPORTANT : si EXTERNAL_CADDY_NETWORK n'est pas défini (ligne de commande ou
# .env), la valeur par défaut ci-dessous est utilisée silencieusement — un simple
# "docker compose ... up -d --build" sans la variable dans le .env recréerait le
# conteneur sur le mauvais réseau et le rendrait injoignable (502 côté Caddy).
# Le plus sûr est de mettre EXTERNAL_CADDY_NETWORK=edge dans le .env une bonne
# fois pour toutes plutôt que de compter sur la ligne de commande à chaque fois.
services:
  app:
    networks:
      default:
      shared_caddy:
        aliases:
          - goungu-app

  frontend:
    build:
      context: ../goungu-your-launchpad
      args:
        # Vide = même origine que la page servie par le Caddy partagé.
        VITE_API_URL: ""
    restart: unless-stopped
    networks:
      default:
      shared_caddy:
        aliases:
          - goungu-frontend

networks:
  shared_caddy:
    external: true
    name: ${EXTERNAL_CADDY_NETWORK:-edge}
