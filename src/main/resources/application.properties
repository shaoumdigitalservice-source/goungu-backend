spring.application.name=goungue-backend

# Base de données MySQL — paramétrable via l'environnement pour Docker/production
# (les valeurs par défaut ci-dessous reproduisent le comportement local d'origine)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:goungue_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Port du serveur (8081 comme pour Shaoume, pour éviter les conflits)
server.port=8082

# Clé secrète pour protéger la création d'admin
# En production, définir la variable d'environnement SETUP_SECRET_KEY (ne jamais garder la valeur par défaut)
setup.secret-key=${SETUP_SECRET_KEY:change-moi-cle-super-secrete-2026}

# Active/désactive POST /api/setup/create-admin. Laisser activé par défaut (dev,
# nouveaux déploiements) ; passer SETUP_ENABLED=false une fois le premier admin
# créé sur un environnement donné pour fermer complètement cet endpoint.
setup.enabled=${SETUP_ENABLED:true}

# Clé de signature JWT (HMAC-SHA256, 256 bits minimum)
# En production, définir la variable d'environnement JWT_SECRET (ne jamais garder la valeur par défaut)
jwt.secret=${JWT_SECRET:goungue-secret-key-pour-jwt-tres-longue-et-securisee-2026}

# Origines autorisées pour le CORS, séparées par des virgules.
# En production sur le VPS : CORS_ALLOWED_ORIGINS=https://votre-domaine.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}

# Limite de taille des fichiers uploadés (images du site, ressources) — au-delà,
# Spring rejette la requête avant même d'atteindre le contrôleur.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
